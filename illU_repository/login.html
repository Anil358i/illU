<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>illU AI - Login</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; display: grid; place-items: center; height: 100vh; background: #f5f5f7; }
        .login-card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%; }
        h2 { margin-top: 0; letter-spacing: -0.02em; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; outline: none; box-sizing: border-box; }
        button { background: #111; color: white; border: none; padding: 14px 28px; border-radius: 99px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        #error-msg { color: #ff3b30; margin-top: 15px; font-size: 0.9rem; display: none; }
        .link { margin-top: 20px; font-size: 0.9rem; color: #555; }
        a { color: #007aff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>illU AI</h2>
        <p>Login to your account</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="error-msg"></div>
        <div class="link">Don't have an account? <a href="register.html">Register here</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDTxyr3zJGsyfmdztvfFz8aw9XSyPCNeQM",
          authDomain: "illU-ai.firebaseapp.com",
          projectId: "nestmate-ai",
          storageBucket: "illU-ai.firebasestorage.app",
          messagingSenderId: "7053398074",
          appId: "1:7053398074:web:13dc18b49402d95107a503"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // If already logged in and verified, skip login page
        onAuthStateChanged(auth, (user) => {
          if (user && user.emailVerified) {
            window.location.replace("index.html");
          }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('loginBtn');

            if (!email || !pass) {
              errorDiv.innerText = "Please enter your email and password.";
              errorDiv.style.display = 'block';
              return;
            }

            btn.disabled = true;
            btn.innerText = 'Logging in…';
            errorDiv.style.display = 'none';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                if (user.emailVerified) {
                    window.location.replace('index.html');
                } else {
                    errorDiv.innerText = "Please verify your email first. Check your inbox.";
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Login';
                }
            } catch (error) {
                const messages = {
                  'auth/user-not-found': 'No account found with that email.',
                  'auth/wrong-password': 'Incorrect password. Try again.',
                  'auth/invalid-email': 'Please enter a valid email address.',
                  'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
                  'auth/invalid-credential': 'Email or password is incorrect.'
                };
                errorDiv.innerText = messages[error.code] || error.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        });
    </script>
</body>
</html>
